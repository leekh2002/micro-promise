spring:
  application:
    name: micro-promise
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true

  sql:
    init:
      mode: always
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: test-github-client-id
            client-secret: test-github-client-secret
          google:
            client-id: test-google-client-id
            client-secret: test-google-client-secret
          naver:
            client-id: test-naver-client-id
            client-secret: test-naver-client-secret
            client-name: naver
            authorization-grant-type: authorization_code
            redirect-uri: http://localhost:8080/login/oauth2/code/naver
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
  jwt:
    secret: test-jwt-secret-key-for-tests-123456
