spring:
  application:
    name: micro-promise
  config:
    import: optional:file:.env[.properties]
#  datasource: ${DB_URL}
#    driver-class-name: com.mysql.cj.jdbc.Driver
#    url:
#    username: ${DB_ID}
#    password: ${DB_PASSWORD}
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

    jpa:
      hibernate:
        ddl-auto: create
      database-platform: org.hibernate.dialect.H2Dialect
      show-sql: true

  sql:
    init:
      mode: always

  github:
    token: ${GITHUB_TOKEN}