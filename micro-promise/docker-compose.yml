services:
  # Spring Boot 백엔드 애플리케이션 컨테이너
  app:
    # 현재 디렉터리의 Dockerfile로 이미지를 직접 빌드한다.
    build:
      context: .
      dockerfile: Dockerfile
    # 컨테이너 이름을 고정한다.
    container_name: micro-promise-app
    # mysql이 정상 기동된 뒤, redis가 시작된 뒤 app을 실행한다.
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    # .env.docker의 환경변수를 app 컨테이너에 주입한다.
    env_file:
      - ./.env.docker
    # 내 PC의 8080 포트를 컨테이너의 8080 포트와 연결한다.
    ports:
      - "8080:8080"
    # 컨테이너가 종료되면 Docker가 자동으로 재시작한다.
    restart: unless-stopped

  # MySQL 데이터베이스 컨테이너
  mysql:
    # 공식 MySQL 8.4 이미지를 사용한다.
    image: mysql:8.4
    # 컨테이너 이름을 고정한다.
    container_name: micro-promise-mysql
    # .env.docker의 환경변수를 mysql 컨테이너에 주입한다.
    env_file:
      - ./.env.docker
    # MySQL 초기 생성값과 시간대를 설정한다.
    environment:
      # 기본 데이터베이스 이름
      MYSQL_DATABASE: micro_promise
      # 애플리케이션에서 사용할 일반 사용자 계정
      MYSQL_USER: appuser
      # 일반 사용자 비밀번호
      MYSQL_PASSWORD: changeme
      # 컨테이너 시간대
      TZ: Asia/Seoul
    # 내 PC의 3307 포트를 컨테이너의 3306 포트와 연결한다.
    ports:
      - "3307:3306"
    # DB 데이터를 컨테이너 바깥의 named volume에 저장한다.
    volumes:
      - mysql_data:/var/lib/mysql
    # MySQL이 실제로 응답 가능한 상태인지 확인한다.
    healthcheck:
      # mysqladmin ping으로 로컬 MySQL 서버의 응답 여부를 검사한다.
      # $$는 compose에서 환경변수를 문자열로 넘기기 위한 이스케이프 표기다.
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p$$MYSQL_ROOT_PASSWORD --silent"]
      # 10초마다 검사
      interval: 10s
      # 한 번 검사에 최대 5초 대기
      timeout: 5s
      # 실패 시 최대 10번 재시도
      retries: 10
      # 시작 직후 20초는 준비 시간으로 본다.
      start_period: 20s
    # 컨테이너가 종료되면 Docker가 자동으로 재시작한다.
    restart: unless-stopped

  # Redis 캐시/세션 저장소 컨테이너
  redis:
    # 공식 Redis 경량 이미지를 사용한다.
    image: redis:7-alpine
    # 컨테이너 이름을 고정한다.
    container_name: micro-promise-redis
    # .env.docker의 환경변수를 redis 컨테이너에 주입한다.
    env_file:
      - ./.env.docker
    # Redis를 AOF 영속성 + 비밀번호 인증 모드로 실행한다.
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\""]
    # 내 PC의 6380 포트를 컨테이너의 6379 포트와 연결한다.
    ports:
      - "6380:6379"
    # Redis 데이터를 컨테이너 바깥의 named volume에 저장한다.
    volumes:
      - redis_data:/data
    # 컨테이너가 종료되면 Docker가 자동으로 재시작한다.
    restart: unless-stopped

# Docker가 관리하는 영속 볼륨 정의
volumes:
  # MySQL 데이터 저장용 볼륨
  mysql_data:
  # Redis 데이터 저장용 볼륨
  redis_data:
